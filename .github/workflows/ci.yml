name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prettier --check "**/*.md" --no-error-on-unmatched-pattern

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      user-service: ${{ steps.filter.outputs.user-service }}
      wallet-service: ${{ steps.filter.outputs.wallet-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      ai-service: ${{ steps.filter.outputs.ai-service }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user-service:
              - 'services/user-service/**'
            wallet-service:
              - 'services/wallet-service/**'
            notification-service:
              - 'services/notification-service/**'
            ai-service:
              - 'services/ai-service/**'

  lint-node:
    name: Lint (${{ matrix.service }})
    needs: changes
    if: |
      needs.changes.outputs.user-service == 'true' ||
      needs.changes.outputs.wallet-service == 'true' ||
      needs.changes.outputs.notification-service == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            changed: ${{ needs.changes.outputs.user-service }}
          - service: wallet-service
            changed: ${{ needs.changes.outputs.wallet-service }}
          - service: notification-service
            changed: ${{ needs.changes.outputs.notification-service }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - uses: actions/setup-node@v4
        if: matrix.changed == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - run: npm ci
        if: matrix.changed == 'true'

      - run: npm run lint
        if: matrix.changed == 'true'

  test-node:
    name: Test (${{ matrix.service }})
    needs: changes
    if: |
      needs.changes.outputs.user-service == 'true' ||
      needs.changes.outputs.wallet-service == 'true' ||
      needs.changes.outputs.notification-service == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            db: walletos_users
            changed: ${{ needs.changes.outputs.user-service }}
          - service: wallet-service
            db: walletos_wallets
            changed: ${{ needs.changes.outputs.wallet-service }}
          - service: notification-service
            db: walletos_notifications
            changed: ${{ needs.changes.outputs.notification-service }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: walletos
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ${{ matrix.db }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U walletos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: walletos
          RABBITMQ_DEFAULT_PASS: test
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    env:
      DATABASE_URL: postgresql://walletos:test@localhost:5432/${{ matrix.db }}
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://walletos:test@localhost:5672
    steps:
      - uses: actions/checkout@v4
        if: matrix.changed == 'true'

      - uses: actions/setup-node@v4
        if: matrix.changed == 'true'
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - run: npm ci
        if: matrix.changed == 'true'

      - run: npm test
        if: matrix.changed == 'true'

  lint-python:
    name: Lint (ai-service)
    needs: changes
    if: needs.changes.outputs.ai-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai-service/requirements.txt

      - run: pip install ruff mypy

      - run: ruff check .

      - run: mypy .

  test-python:
    name: Test (ai-service)
    needs: changes
    if: needs.changes.outputs.ai-service == 'true'
    runs-on: ubuntu-latest
    services:
      postgres-ai:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: walletos
          POSTGRES_PASSWORD: test
          POSTGRES_DB: walletos_ai
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U walletos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: walletos
          RABBITMQ_DEFAULT_PASS: test
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/ai-service
    env:
      DATABASE_URL: postgresql://walletos:test@localhost:5433/walletos_ai
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://walletos:test@localhost:5672
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai-service/requirements.txt

      - run: pip install -r requirements.txt

      - run: pytest
