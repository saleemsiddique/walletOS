services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: walletos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db/postgres:/docker-entrypoint-initdb.d
    networks:
      - walletos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walletos -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-ai:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: walletos
      POSTGRES_PASSWORD: ${POSTGRES_AI_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_ai_data:/var/lib/postgresql/data
      - ./init-db/postgres-ai:/docker-entrypoint-initdb.d
    networks:
      - walletos-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U walletos -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - walletos-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: walletos
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - walletos-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  walletos-net:
    driver: bridge

volumes:
  postgres_data:
  postgres_ai_data:
  rabbitmq_data:
