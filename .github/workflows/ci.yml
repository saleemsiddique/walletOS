name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [main]

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prettier --check "**/*.md" --no-error-on-unmatched-pattern

  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      user-service: ${{ steps.filter.outputs.user-service }}
      wallet-service: ${{ steps.filter.outputs.wallet-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      ai-service: ${{ steps.filter.outputs.ai-service }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            user-service:
              - 'services/user-service/**'
            wallet-service:
              - 'services/wallet-service/**'
            notification-service:
              - 'services/notification-service/**'
            ai-service:
              - 'services/ai-service/**'

  lint-user-service:
    name: Lint (user-service)
    needs: changes
    if: needs.changes.outputs.user-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/user-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check service is scaffolded
        id: scaffolded
        run: |
          if [ -f "package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: services/user-service has no package.json yet"
          fi

      - run: npm ci
        if: steps.scaffolded.outputs.ready == 'true'

      - run: npm run lint
        if: steps.scaffolded.outputs.ready == 'true'

      - run: npm run typecheck
        if: steps.scaffolded.outputs.ready == 'true'

  lint-wallet-service:
    name: Lint (wallet-service)
    needs: changes
    if: needs.changes.outputs.wallet-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/wallet-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check service is scaffolded
        id: scaffolded
        run: |
          if [ -f "package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: services/wallet-service has no package.json yet"
          fi

      - run: npm ci
        if: steps.scaffolded.outputs.ready == 'true'

      - run: npm run lint
        if: steps.scaffolded.outputs.ready == 'true'

      - run: npm run typecheck
        if: steps.scaffolded.outputs.ready == 'true'

  lint-notification-service:
    name: Lint (notification-service)
    needs: changes
    if: needs.changes.outputs.notification-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/notification-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check service is scaffolded
        id: scaffolded
        run: |
          if [ -f "package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: services/notification-service has no package.json yet"
          fi

      - run: npm ci
        if: steps.scaffolded.outputs.ready == 'true'

      - run: npm run lint
        if: steps.scaffolded.outputs.ready == 'true'

      - run: npm run typecheck
        if: steps.scaffolded.outputs.ready == 'true'

  test-user-service:
    name: Test (user-service)
    needs: changes
    if: needs.changes.outputs.user-service == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: walletos
          POSTGRES_PASSWORD: test
          POSTGRES_DB: walletos_users
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U walletos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: walletos
          RABBITMQ_DEFAULT_PASS: test
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/user-service
    env:
      DATABASE_URL: postgresql://walletos:test@localhost:5432/walletos_users
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://walletos:test@localhost:5672
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check service is scaffolded
        id: scaffolded
        run: |
          if [ -f "package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: services/user-service has no package.json yet"
          fi

      - run: npm ci
        if: steps.scaffolded.outputs.ready == 'true'

      - name: Run migrations
        if: steps.scaffolded.outputs.ready == 'true'
        run: |
          if [ -f "prisma/schema.prisma" ]; then
            npx prisma migrate deploy
          fi

      - run: npm test
        if: steps.scaffolded.outputs.ready == 'true'

  test-wallet-service:
    name: Test (wallet-service)
    needs: changes
    if: needs.changes.outputs.wallet-service == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: walletos
          POSTGRES_PASSWORD: test
          POSTGRES_DB: walletos_wallets
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U walletos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: walletos
          RABBITMQ_DEFAULT_PASS: test
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/wallet-service
    env:
      DATABASE_URL: postgresql://walletos:test@localhost:5432/walletos_wallets
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://walletos:test@localhost:5672
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check service is scaffolded
        id: scaffolded
        run: |
          if [ -f "package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: services/wallet-service has no package.json yet"
          fi

      - run: npm ci
        if: steps.scaffolded.outputs.ready == 'true'

      - name: Run migrations
        if: steps.scaffolded.outputs.ready == 'true'
        run: |
          if [ -f "prisma/schema.prisma" ]; then
            npx prisma migrate deploy
          fi

      - run: npm test
        if: steps.scaffolded.outputs.ready == 'true'

  test-notification-service:
    name: Test (notification-service)
    needs: changes
    if: needs.changes.outputs.notification-service == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: walletos
          POSTGRES_PASSWORD: test
          POSTGRES_DB: walletos_notifications
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U walletos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: walletos
          RABBITMQ_DEFAULT_PASS: test
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/notification-service
    env:
      DATABASE_URL: postgresql://walletos:test@localhost:5432/walletos_notifications
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://walletos:test@localhost:5672
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Check service is scaffolded
        id: scaffolded
        run: |
          if [ -f "package.json" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: services/notification-service has no package.json yet"
          fi

      - run: npm ci
        if: steps.scaffolded.outputs.ready == 'true'

      - name: Run migrations
        if: steps.scaffolded.outputs.ready == 'true'
        run: |
          if [ -f "prisma/schema.prisma" ]; then
            npx prisma migrate deploy
          fi

      - run: npm test
        if: steps.scaffolded.outputs.ready == 'true'

  lint-ai-service:
    name: Lint (ai-service)
    needs: changes
    if: needs.changes.outputs.ai-service == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ai-service
    steps:
      - uses: actions/checkout@v4

      - name: Check service is scaffolded
        id: scaffolded
        run: |
          if [ -f "requirements.txt" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: services/ai-service has no requirements.txt yet"
          fi

      - uses: actions/setup-python@v5
        if: steps.scaffolded.outputs.ready == 'true'
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai-service/requirements.txt

      - run: pip install ruff mypy
        if: steps.scaffolded.outputs.ready == 'true'

      - run: ruff check .
        if: steps.scaffolded.outputs.ready == 'true'

      - run: mypy .
        if: steps.scaffolded.outputs.ready == 'true'

  test-ai-service:
    name: Test (ai-service)
    needs: changes
    if: needs.changes.outputs.ai-service == 'true'
    runs-on: ubuntu-latest
    services:
      postgres-ai:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: walletos
          POSTGRES_PASSWORD: test
          POSTGRES_DB: walletos_ai
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U walletos"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        env:
          RABBITMQ_DEFAULT_USER: walletos
          RABBITMQ_DEFAULT_PASS: test
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: services/ai-service
    env:
      DATABASE_URL: postgresql://walletos:test@localhost:5433/walletos_ai
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://walletos:test@localhost:5672
    steps:
      - uses: actions/checkout@v4

      - name: Check service is scaffolded
        id: scaffolded
        run: |
          if [ -f "requirements.txt" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: services/ai-service has no requirements.txt yet"
          fi

      - uses: actions/setup-python@v5
        if: steps.scaffolded.outputs.ready == 'true'
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: services/ai-service/requirements.txt

      - run: pip install -r requirements.txt
        if: steps.scaffolded.outputs.ready == 'true'

      - run: pytest
        if: steps.scaffolded.outputs.ready == 'true'
